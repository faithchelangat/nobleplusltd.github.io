<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Noble Plus Ltd</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* Tablet */
        @media (max-width: 992px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Mobile */
        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <h1>Our Gallery</h1>

    <div class="gallery">
        <img src="Photos1/WA0024.png" alt="Gallery Image">
        <img src="Photos1/WA0026.png" alt="Gallery Image">
        <img src="Photos1/WA0027.png" alt="Gallery Image">
        <img src="Photos1/WA0043.png" alt="Gallery Image">
        <img src="Photos1/WA0044.png" alt="Gallery Image">
        <img src="Photos1/116318.jpg" alt="Gallery Image">
        <img src="Photos1/116321.jpg" alt="Gallery Image">
        <img src="Photos1/116352.jpg" alt="Gallery Image">
        <img src="Photos1/116342.jpg" alt="Gallery Image">
        <img src="Photos1/116340.jpg" alt="Gallery Image">
        <img src="Photos1/116336.jpg" alt="Gallery Image">
        <img src="Photos1/116358.jpg" alt="Gallery Image"><br><br><br><br><br>
    </div>

</body>
</html>
